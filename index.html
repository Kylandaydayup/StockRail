<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>入库报单登记</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="phone-shell">
      <header class="wechat-bar">
        <button id="close-page" class="icon-button" type="button" aria-label="关闭">×</button>
        <div>
          <strong>（入库）报单登记</strong>
          <span>stockrail.local</span>
        </div>
        <a class="admin-link" href="/admin" aria-label="管理员">管理</a>
      </header>

      <form id="order-form" class="report-form" novalidate>
        <h1>（入库） 报单登记</h1>
        <div class="profile-strip">
          <button id="current-user" class="data-button" type="button">
            <span>♙</span>
            我的数据
          </button>
          <label class="avatar-replace">
            <input id="avatar-file" type="file" accept="image/png,image/jpeg,image/webp" />
            <span>换头像</span>
          </label>
        </div>
        <section id="invite-panel" class="invite-panel">
          <div>
            <strong>我的邀请链接</strong>
            <span id="invite-count">已邀请 0 人</span>
            <small id="invite-link-text" class="invite-link-text"></small>
          </div>
          <button id="copy-invite" type="button">复制邀请链接</button>
        </section>

        <section class="form-section">
          <label class="field-row" data-field="wechatName">
            <span>微信名字</span>
            <div class="field-control">
              <input name="wechatName" aria-describedby="wechatName-error" placeholder="结账时能快速在微信上找到你" />
              <p id="wechatName-error" class="field-error" data-error-for="wechatName"></p>
            </div>
          </label>

          <label class="field-row selectable" data-field="deliveryMethod">
            <span>交货方式</span>
            <div class="field-control">
              <select name="deliveryMethod" aria-describedby="deliveryMethod-error">
                <option>快递/物流</option>
                <option>自送</option>
                <option>同城配送</option>
              </select>
              <p id="deliveryMethod-error" class="field-error" data-error-for="deliveryMethod"></p>
            </div>
          </label>

          <label class="field-row" data-field="trackingNumbers">
            <span><b>*</b>快递单号</span>
            <div class="field-control">
              <textarea name="trackingNumbers" rows="2" aria-describedby="trackingNumbers-error" placeholder="可填写多个快递单号，用/隔开：中通1234/韵达5678"></textarea>
              <p id="trackingNumbers-error" class="field-error" data-error-for="trackingNumbers"></p>
            </div>
          </label>

          <label class="field-row" data-field="totalBoxes">
            <span><b>*</b>总件数</span>
            <div class="field-control">
              <input name="totalBoxes" inputmode="numeric" aria-describedby="totalBoxes-error" placeholder="该单号一共到多少箱的货" />
              <p id="totalBoxes-error" class="field-error" data-error-for="totalBoxes"></p>
            </div>
          </label>
        </section>

        <section class="detail-section">
          <div class="section-title">
            <span><b>*</b>入库明细</span>
            <div class="section-actions">
              <button id="quick-add" class="square-button" type="button" aria-label="新增明细">＋</button>
              <button id="collapse-all" class="light-button" type="button">全部收起</button>
            </div>
          </div>
          <div id="items" class="items"></div>
        </section>

        <section class="form-section">
          <label class="field-row muted-row" data-field="totalCans">
            <span>总罐数</span>
            <div class="field-control">
              <input name="totalCans" inputmode="numeric" aria-describedby="totalCans-error" placeholder="暂无内容" />
              <p id="totalCans-error" class="field-error" data-error-for="totalCans"></p>
            </div>
          </label>

          <label class="field-row" data-field="phone">
            <span><b>*</b>联系方式</span>
            <div class="field-control">
              <input name="phone" inputmode="tel" aria-describedby="phone-error" placeholder="请填写手机号码" />
              <p id="phone-error" class="field-error" data-error-for="phone"></p>
            </div>
          </label>

          <label class="field-row" data-field="remark">
            <span>备注</span>
            <div class="field-control">
              <textarea name="remark" rows="3" aria-describedby="remark-error" placeholder="备注其他奶粉品类/瘪罐/老日期信息，比如：皇家3-2月/瘪2个"></textarea>
              <p id="remark-error" class="field-error" data-error-for="remark"></p>
            </div>
          </label>
        </section>

        <p id="form-error" class="form-error" role="alert"></p>
        <button class="submit-button" type="submit">提交报单</button>
      </form>

      <div id="success-sheet" class="success-sheet" hidden>
        <div>
          <strong>报单已提交</strong>
          <p>管理员现在可以在订单详情里查看这条记录。</p>
          <a href="/admin">查看管理员页</a>
          <button type="button" id="new-order">继续报单</button>
        </div>
      </div>
      <p id="toast" class="toast" role="status" aria-live="polite" hidden></p>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
