<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>入库报单系统 - 登录</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="login-shell">
      <section class="login-card">
        <p>入库报单系统</p>
        <h1>账号登录</h1>
        <div class="auth-tabs">
          <button class="active" type="button" data-panel="login-panel">登录</button>
          <button type="button" data-panel="register-panel">注册</button>
        </div>
        <form id="login-form" class="auth-panel" data-panel-id="login-panel">
          <label>
            <span>邮箱</span>
            <input name="username" autocomplete="username" placeholder="请输入邮箱" />
          </label>
          <label>
            <span class="field-title-row">
              密码
              <button class="text-link" type="button" data-panel-link="reset-panel">忘记密码？</button>
            </span>
            <input name="password" type="password" autocomplete="current-password" placeholder="请输入密码" />
          </label>
          <p id="login-error" class="form-error"></p>
          <button class="submit-button" type="submit">登录</button>
        </form>
        <form id="register-form" class="auth-panel" data-panel-id="register-panel" hidden>
          <input name="inviteCode" type="hidden" />
          <label>
            <span>邮箱</span>
            <input name="email" autocomplete="email" placeholder="请输入邮箱" />
          </label>
          <div class="code-row">
            <input name="verificationCode" inputmode="numeric" maxlength="6" placeholder="邮箱验证码" />
            <button type="button" data-send-code="register">发送验证码</button>
          </div>
          <label>
            <span>密码</span>
            <input name="password" type="password" autocomplete="new-password" placeholder="至少 8 位" />
          </label>
          <label>
            <span>昵称</span>
            <input name="nickname" placeholder="默认显示名称" />
          </label>
          <label class="avatar-upload">
            <span>头像</span>
            <input name="avatarFile" type="file" accept="image/png,image/jpeg,image/webp" />
            <small>选择手机相册里的图片</small>
          </label>
          <p id="register-error" class="form-error"></p>
          <button class="submit-button" type="submit">注册并登录</button>
        </form>
        <form id="reset-form" class="auth-panel" data-panel-id="reset-panel" hidden>
          <div class="panel-title-row">
            <strong>重置密码</strong>
            <button class="text-link" type="button" data-panel-link="login-panel">返回登录</button>
          </div>
          <label>
            <span>邮箱</span>
            <input name="email" autocomplete="email" placeholder="请输入注册邮箱" />
          </label>
          <div class="code-row">
            <input name="verificationCode" inputmode="numeric" maxlength="6" placeholder="邮箱验证码" />
            <button type="button" data-send-code="reset">发送验证码</button>
          </div>
          <label>
            <span>新密码</span>
            <input name="password" type="password" autocomplete="new-password" placeholder="至少 8 位" />
          </label>
          <p id="reset-error" class="form-error"></p>
          <button class="submit-button" type="submit">重置密码</button>
        </form>
      </section>
    </main>
    <script type="module" src="./src/login.js"></script>
  </body>
</html>
