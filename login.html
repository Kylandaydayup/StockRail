<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StockRail 登录</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="login-shell">
      <section class="login-card">
        <p>StockRail 库存轨道</p>
        <h1>账号登录</h1>
        <form id="login-form">
          <label>
            <span>用户名</span>
            <input name="username" autocomplete="username" placeholder="请输入用户名" />
          </label>
          <label>
            <span>密码</span>
            <input name="password" type="password" autocomplete="current-password" placeholder="请输入密码" />
          </label>
          <p id="login-error" class="form-error"></p>
          <button class="submit-button" type="submit">登录</button>
        </form>
      </section>
    </main>
    <script type="module" src="./src/login.js"></script>
  </body>
</html>
